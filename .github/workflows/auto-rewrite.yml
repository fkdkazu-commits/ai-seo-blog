name: Auto Rewrite

on:
  schedule:
    - cron: '0 22 * * *'  # 毎日 AM 7:00 JST (UTC 22:00)
  workflow_dispatch:

jobs:
  rewrite:
    runs-on: self-hosted
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Run AI rewrite via Claude.ai (Playwright)
        env:
          SITE_URL: https://fkdkazu-commits.github.io/ai-seo-blog
        run: npm run rewrite

      - name: Commit rewritten article
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "refactor: AIリライト $(Get-Date -Format 'yyyy-MM-dd')"
          git push
      # mainへのpushでdeploy.ymlが自動起動し、GitHub Pagesへデプロイされる
