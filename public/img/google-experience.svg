<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 168" role="img" aria-label="Core Web VitalsとモバイルユーザビリティのSEO影響">
  <rect width="600" height="168" rx="14" fill="#EFF6FF"/>
  <text x="300" y="26" text-anchor="middle" fill="#1E40AF" font-size="13" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif" font-weight="700">エクスペリエンスレポートの確認ポイント</text>

  <rect x="20" y="44" width="560" height="36" rx="8" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
  <circle cx="52" cy="62" r="14" fill="#1D4ED8"/>
  <text x="52" y="67" text-anchor="middle" fill="white" font-size="9" font-family="sans-serif" font-weight="700">CWV</text>
  <text x="78" y="57" fill="#1E293B" font-size="12" font-family="'Noto Sans JP',sans-serif" font-weight="700">Core Web Vitals：良好（緑）→問題なし　不良（赤）→優先対応</text>
  <text x="78" y="74" fill="#1D4ED8" font-size="11" font-family="'Noto Sans JP',sans-serif" font-weight="600">★ 赤いURLは画像圧縮・キャッシュ設定などで改善できる</text>

  <rect x="20" y="88" width="560" height="36" rx="8" fill="white" stroke="#BFDBFE" stroke-width="1.5"/>
  <circle cx="52" cy="106" r="14" fill="#2563EB"/>
  <text x="52" y="111" text-anchor="middle" fill="white" font-size="9" font-family="sans-serif" font-weight="700">MB</text>
  <text x="78" y="101" fill="#1E293B" font-size="12" font-family="'Noto Sans JP',sans-serif" font-weight="700">モバイルユーザビリティ：スマホ表示の問題を一覧確認</text>
  <text x="78" y="118" fill="#64748B" font-size="11" font-family="'Noto Sans JP',sans-serif">モバイルファーストインデックス採用のためモバイル対応は必須</text>

  <rect x="20" y="132" width="560" height="28" rx="8" fill="white" stroke="#BFDBFE" stroke-width="1.5"/>
  <text x="300" y="151" text-anchor="middle" fill="#64748B" font-size="11" font-family="'Noto Sans JP',sans-serif">エラーが見つかったら詳細をクリックして原因を特定→優先度順に対応する</text>
</svg>
