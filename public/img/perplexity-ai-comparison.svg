<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 195" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">
  <rect width="600" height="195" rx="14" fill="#EFF6FF"/>
  <text x="300" y="26" text-anchor="middle" fill="#1E40AF" font-size="13" font-weight="700">Perplexity AI vs Google検索 vs ChatGPT：3つの違い</text>
  <!-- Card 1: Google x=20 -->
  <rect x="20" y="40" width="176" height="140" rx="10" fill="white" stroke="#BFDBFE" stroke-width="1.5"/>
  <rect x="46" y="54" width="124" height="26" rx="13" fill="#DC2626"/>
  <text x="108" y="71" text-anchor="middle" fill="white" font-size="11" font-weight="700">Google検索</text>
  <text x="108" y="104" text-anchor="middle" fill="#1E293B" font-size="13" font-weight="700">リンク一覧を返す</text>
  <text x="108" y="124" text-anchor="middle" fill="#64748B" font-size="11">自分でサイトを開いて読む</text>
  <text x="108" y="142" text-anchor="middle" fill="#64748B" font-size="11">情報統合は手動作業</text>
  <text x="108" y="161" text-anchor="middle" fill="#64748B" font-size="11">リアルタイム性は高い</text>
  <!-- Card 2: ChatGPT x=212 -->
  <rect x="212" y="40" width="176" height="140" rx="10" fill="white" stroke="#BFDBFE" stroke-width="1.5"/>
  <rect x="238" y="54" width="124" height="26" rx="13" fill="#D97706"/>
  <text x="300" y="71" text-anchor="middle" fill="white" font-size="11" font-weight="700">ChatGPT</text>
  <text x="300" y="104" text-anchor="middle" fill="#1E293B" font-size="13" font-weight="700">学習済みデータから生成</text>
  <text x="300" y="124" text-anchor="middle" fill="#64748B" font-size="11">文章生成・分析が得意</text>
  <text x="300" y="142" text-anchor="middle" fill="#64748B" font-size="11">リアルタイム情報は有料版</text>
  <text x="300" y="161" text-anchor="middle" fill="#64748B" font-size="11">出典なし（標準版）</text>
  <!-- Card 3: Perplexity x=404 -->
  <rect x="404" y="40" width="176" height="140" rx="10" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
  <rect x="430" y="54" width="124" height="26" rx="13" fill="#2563EB"/>
  <text x="492" y="71" text-anchor="middle" fill="white" font-size="11" font-weight="700">Perplexity AI ★</text>
  <text x="492" y="104" text-anchor="middle" fill="#1E293B" font-size="13" font-weight="700">出典付きで答えを返す</text>
  <text x="492" y="124" text-anchor="middle" fill="#1D4ED8" font-size="11" font-weight="600">無料でリアルタイム参照</text>
  <text x="492" y="142" text-anchor="middle" fill="#1D4ED8" font-size="11" font-weight="600">引用番号で裏取り即完了</text>
  <text x="492" y="161" text-anchor="middle" fill="#64748B" font-size="11">情報統合をAIが代行</text>
</svg>
