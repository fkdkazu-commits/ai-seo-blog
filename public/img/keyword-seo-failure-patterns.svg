<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 308" role="img" aria-label="初心者が陥る4つのキーワード選定失敗パターン">
  <rect width="600" height="308" rx="14" fill="#EFF6FF"/>
  <text x="300" y="26" text-anchor="middle" fill="#1E40AF" font-size="13" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif" font-weight="700">初心者が陥る4つの失敗パターン</text>

  <!-- パターン1（左上） -->
  <rect x="20" y="40" width="270" height="120" rx="10" fill="white" stroke="#BFDBFE" stroke-width="1.5"/>
  <rect x="20" y="40" width="270" height="32" rx="10" fill="#DC2626"/>
  <rect x="20" y="58" width="270" height="14" fill="#DC2626"/>
  <text x="155" y="62" text-anchor="middle" fill="white" font-size="12" font-family="'Noto Sans JP',sans-serif" font-weight="700">パターン①　失敗起点型</text>
  <text x="36" y="94" fill="#1E293B" font-size="12" font-family="'Noto Sans JP',sans-serif" font-weight="700">ビッグKWを狙って3ヶ月以上圏外</text>
  <text x="36" y="113" fill="#64748B" font-size="11" font-family="'Noto Sans JP',sans-serif">月10〜100のスモールKWに絞り直す</text>
  <text x="36" y="148" fill="#64748B" font-size="11" font-family="'Noto Sans JP',sans-serif">競合が個人ブログ中心か確認してから着手</text>

  <!-- パターン2（右上） -->
  <rect x="310" y="40" width="270" height="120" rx="10" fill="white" stroke="#BFDBFE" stroke-width="1.5"/>
  <rect x="310" y="40" width="270" height="32" rx="10" fill="#D97706"/>
  <rect x="310" y="58" width="270" height="14" fill="#D97706"/>
  <text x="445" y="62" text-anchor="middle" fill="white" font-size="12" font-family="'Noto Sans JP',sans-serif" font-weight="700">パターン②　詰め込み型</text>
  <text x="326" y="94" fill="#1E293B" font-size="12" font-family="'Noto Sans JP',sans-serif" font-weight="700">1記事に複数KWを詰め込む</text>
  <text x="326" y="113" fill="#64748B" font-size="11" font-family="'Noto Sans JP',sans-serif">1記事1KW原則・関連語は共起語で補完</text>
  <text x="326" y="148" fill="#64748B" font-size="11" font-family="'Noto Sans JP',sans-serif">タイトル左側にメインKWを1つ明確に配置</text>

  <!-- パターン3（左下） -->
  <rect x="20" y="174" width="270" height="120" rx="10" fill="white" stroke="#BFDBFE" stroke-width="1.5"/>
  <rect x="20" y="174" width="270" height="32" rx="10" fill="#7C3AED"/>
  <rect x="20" y="192" width="270" height="14" fill="#7C3AED"/>
  <text x="155" y="196" text-anchor="middle" fill="white" font-size="12" font-family="'Noto Sans JP',sans-serif" font-weight="700">パターン③　データ起点型</text>
  <text x="36" y="228" fill="#1E293B" font-size="12" font-family="'Noto Sans JP',sans-serif" font-weight="700">ツール数値だけで競合分析をスキップ</text>
  <text x="36" y="247" fill="#64748B" font-size="11" font-family="'Noto Sans JP',sans-serif">実際に検索して個人ブログ3件以上を確認</text>
  <text x="36" y="282" fill="#64748B" font-size="11" font-family="'Noto Sans JP',sans-serif">上位記事を読み込み自分が上回れるか判断する</text>

  <!-- パターン4（右下） -->
  <rect x="310" y="174" width="270" height="120" rx="10" fill="white" stroke="#BFDBFE" stroke-width="1.5"/>
  <rect x="310" y="174" width="270" height="32" rx="10" fill="#0891B2"/>
  <rect x="310" y="192" width="270" height="14" fill="#0891B2"/>
  <text x="445" y="196" text-anchor="middle" fill="white" font-size="12" font-family="'Noto Sans JP',sans-serif" font-weight="700">パターン④　ツール任せ型</text>
  <text x="326" y="228" fill="#1E293B" font-size="12" font-family="'Noto Sans JP',sans-serif" font-weight="700">抽出で選定が止まりリスト化できない</text>
  <text x="326" y="247" fill="#64748B" font-size="11" font-family="'Noto Sans JP',sans-serif">SCに貼り付け→100以下に絞込→競合確認</text>
  <text x="326" y="282" fill="#64748B" font-size="11" font-family="'Noto Sans JP',sans-serif">「まず書く記事リスト」5〜10本を確定させる</text>
</svg>
