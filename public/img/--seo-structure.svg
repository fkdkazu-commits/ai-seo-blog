<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 168" role="img" aria-label="検索上位を狙う記事構成の3ポイント">
  <rect width="600" height="168" rx="14" fill="#EFF6FF"/>
  <text x="300" y="26" text-anchor="middle" fill="#1E40AF" font-size="13" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif" font-weight="700">検索上位を狙う記事構成の3ポイント</text>

  <rect x="20" y="44" width="560" height="36" rx="8" fill="white" stroke="#BFDBFE" stroke-width="1.5"/>
  <circle cx="52" cy="62" r="14" fill="#2563EB"/>
  <text x="52" y="67" text-anchor="middle" fill="white" font-size="10" font-family="sans-serif" font-weight="700">①</text>
  <text x="78" y="57" fill="#1E293B" font-size="12" font-family="'Noto Sans JP',sans-serif" font-weight="700">ファーストビューで「解決できる」と3〜5秒で伝える</text>
  <text x="78" y="74" fill="#64748B" font-size="11" font-family="'Noto Sans JP',sans-serif">悩み言語化・得られる成果・筆者の根拠をリード文に盛り込む</text>

  <rect x="20" y="88" width="560" height="36" rx="8" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
  <circle cx="52" cy="106" r="14" fill="#1D4ED8"/>
  <text x="52" y="111" text-anchor="middle" fill="white" font-size="10" font-family="sans-serif" font-weight="700">②</text>
  <text x="78" y="101" fill="#1E293B" font-size="12" font-family="'Noto Sans JP',sans-serif" font-weight="700">見出しにはメインKWの関連語・共起語を自然に含める</text>
  <text x="78" y="118" fill="#1D4ED8" font-size="11" font-family="'Noto Sans JP',sans-serif" font-weight="600">★ 読者が知りたい流れに沿った構成を優先（詰め込み禁止）</text>

  <rect x="20" y="124" width="560" height="36" rx="8" fill="white" stroke="#BFDBFE" stroke-width="1.5"/>
  <circle cx="52" cy="142" r="14" fill="#2563EB"/>
  <text x="52" y="147" text-anchor="middle" fill="white" font-size="10" font-family="sans-serif" font-weight="700">③</text>
  <text x="78" y="137" fill="#1E293B" font-size="12" font-family="'Noto Sans JP',sans-serif" font-weight="700">文字数より「情報密度」：1文ごとに価値があるか問い直す</text>
  <text x="78" y="154" fill="#64748B" font-size="11" font-family="'Noto Sans JP',sans-serif">網羅的な情報収集型なら2,000〜5,000字が目安</text>
</svg>
