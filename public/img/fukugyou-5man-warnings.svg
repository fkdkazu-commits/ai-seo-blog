<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 168" role="img" aria-label="副業で失敗しないための注意点3つ">
  <rect width="600" height="168" rx="14" fill="#EFF6FF"/>
  <text x="300" y="26" text-anchor="middle" fill="#1E40AF" font-size="13" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif" font-weight="700">副業で失敗しないための注意点3つ</text>

  <!-- Row 1 -->
  <rect x="20" y="44" width="560" height="36" rx="8" fill="white" stroke="#BFDBFE" stroke-width="1.5"/>
  <circle cx="52" cy="62" r="14" fill="#2563EB"/>
  <text x="52" y="67" text-anchor="middle" fill="white" font-size="10" font-family="sans-serif" font-weight="700">①</text>
  <text x="78" y="57" fill="#1E293B" font-size="12" font-family="'Noto Sans JP',sans-serif" font-weight="700">確定申告の必要性を理解しておく</text>
  <text x="78" y="74" fill="#64748B" font-size="11" font-family="'Noto Sans JP',sans-serif">副業収入年間20万円超で確定申告必要（会社員の場合）</text>

  <!-- Row 2 (highlighted) -->
  <rect x="20" y="88" width="560" height="36" rx="8" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
  <circle cx="52" cy="106" r="14" fill="#1D4ED8"/>
  <text x="52" y="111" text-anchor="middle" fill="white" font-size="10" font-family="sans-serif" font-weight="700">②</text>
  <text x="78" y="101" fill="#1E293B" font-size="12" font-family="'Noto Sans JP',sans-serif" font-weight="700">会社の就業規則を確認する</text>
  <text x="78" y="118" fill="#1D4ED8" font-size="11" font-family="'Noto Sans JP',sans-serif" font-weight="600">★ 副業禁止規定の有無を開始前に確認しておく</text>

  <!-- Row 3 -->
  <rect x="20" y="124" width="560" height="36" rx="8" fill="white" stroke="#BFDBFE" stroke-width="1.5"/>
  <circle cx="52" cy="142" r="14" fill="#2563EB"/>
  <text x="52" y="147" text-anchor="middle" fill="white" font-size="10" font-family="sans-serif" font-weight="700">③</text>
  <text x="78" y="137" fill="#1E293B" font-size="12" font-family="'Noto Sans JP',sans-serif" font-weight="700">詐欺的な副業案件に注意する</text>
  <text x="78" y="154" fill="#64748B" font-size="11" font-family="'Noto Sans JP',sans-serif">「簡単に月○十万」「初期費用必要」は高確率でトラブルの原因</text>
</svg>
