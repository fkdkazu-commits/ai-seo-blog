<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 220" role="img" aria-label="副業で活用できる主なAIツール">
  <rect width="600" height="220" rx="14" fill="#EFF6FF"/>
  <text x="300" y="26" text-anchor="middle" fill="#1E40AF" font-size="13" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif" font-weight="700">副業で活用できる主なAIツール（用途別）</text>

  <!-- Row 1 -->
  <rect x="20" y="44" width="560" height="44" rx="8" fill="white" stroke="#BFDBFE" stroke-width="1.5"/>
  <rect x="28" y="54" width="124" height="24" rx="12" fill="#2563EB"/>
  <text x="90" y="70" text-anchor="middle" fill="white" font-size="11" font-family="'Noto Sans JP',sans-serif" font-weight="700">文章生成・対話</text>
  <text x="166" y="61" fill="#1E293B" font-size="12" font-family="'Noto Sans JP',sans-serif" font-weight="700">ChatGPT・Claude・Gemini</text>
  <text x="166" y="78" fill="#64748B" font-size="11" font-family="'Noto Sans JP',sans-serif">ライティング・アイデア出し・調査補助に幅広く対応</text>

  <!-- Row 2 (highlighted) -->
  <rect x="20" y="96" width="560" height="44" rx="8" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
  <rect x="28" y="106" width="124" height="24" rx="12" fill="#1D4ED8"/>
  <text x="90" y="122" text-anchor="middle" fill="white" font-size="11" font-family="'Noto Sans JP',sans-serif" font-weight="700">画像生成</text>
  <text x="166" y="113" fill="#1E293B" font-size="12" font-family="'Noto Sans JP',sans-serif" font-weight="700">Canva・Midjourney・Adobe Firefly</text>
  <text x="166" y="130" fill="#1D4ED8" font-size="11" font-family="'Noto Sans JP',sans-serif" font-weight="600">★ 商用利用の可否を利用規約で必ず確認</text>

  <!-- Row 3 -->
  <rect x="20" y="148" width="560" height="44" rx="8" fill="white" stroke="#BFDBFE" stroke-width="1.5"/>
  <rect x="28" y="158" width="124" height="24" rx="12" fill="#2563EB"/>
  <text x="90" y="174" text-anchor="middle" fill="white" font-size="11" font-family="'Noto Sans JP',sans-serif" font-weight="700">有料移行の目安</text>
  <text x="166" y="165" fill="#1E293B" font-size="12" font-family="'Noto Sans JP',sans-serif" font-weight="700">月額2,000〜3,000円程度</text>
  <text x="166" y="182" fill="#64748B" font-size="11" font-family="'Noto Sans JP',sans-serif">副業収入が月1万円を超えた段階でのアップグレードが目安</text>
