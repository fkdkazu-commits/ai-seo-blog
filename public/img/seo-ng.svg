<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 168" role="img" aria-label="SEO初心者がよくやるNGパターン3つ">
  <rect width="600" height="168" rx="14" fill="#EFF6FF"/>
  <text x="300" y="26" text-anchor="middle" fill="#1E40AF" font-size="13" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif" font-weight="700">SEO初心者がよくやるNGパターン3つ</text>

  <rect x="20" y="44" width="560" height="36" rx="8" fill="white" stroke="#BFDBFE" stroke-width="1.5"/>
  <circle cx="52" cy="62" r="14" fill="#DC2626"/>
  <text x="52" y="67" text-anchor="middle" fill="white" font-size="10" font-family="sans-serif" font-weight="700">NG1</text>
  <text x="78" y="57" fill="#1E293B" font-size="12" font-family="'Noto Sans JP',sans-serif" font-weight="700">キーワードの詰め込み（スタッフィング）</text>
  <text x="78" y="74" fill="#64748B" font-size="11" font-family="'Noto Sans JP',sans-serif">不自然な繰り返しはGoogleのペナルティリスクがある</text>

  <rect x="20" y="88" width="560" height="36" rx="8" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
  <circle cx="52" cy="106" r="14" fill="#DC2626"/>
  <text x="52" y="111" text-anchor="middle" fill="white" font-size="10" font-family="sans-serif" font-weight="700">NG2</text>
  <text x="78" y="101" fill="#1E293B" font-size="12" font-family="'Noto Sans JP',sans-serif" font-weight="700">他サイトからのコピーコンテンツ</text>
  <text x="78" y="118" fill="#1D4ED8" font-size="11" font-family="'Noto Sans JP',sans-serif" font-weight="600">重複コンテンツは低品質評価→順位大幅ダウン</text>

  <rect x="20" y="124" width="560" height="36" rx="8" fill="white" stroke="#BFDBFE" stroke-width="1.5"/>
  <circle cx="52" cy="142" r="14" fill="#DC2626"/>
  <text x="52" y="147" text-anchor="middle" fill="white" font-size="10" font-family="sans-serif" font-weight="700">NG3</text>
  <text x="78" y="137" fill="#1E293B" font-size="12" font-family="'Noto Sans JP',sans-serif" font-weight="700">更新を止める（公開したまま放置）</text>
  <text x="78" y="154" fill="#64748B" font-size="11" font-family="'Noto Sans JP',sans-serif">古い記事は定期リライトで順位を維持・改善できる</text>
</svg>
