<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 308" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">
  <rect width="600" height="308" rx="14" fill="#EFF6FF"/>
  <text x="300" y="26" text-anchor="middle" fill="#1E40AF" font-size="13" font-weight="700">リサーチ時間を10分の1にする5つのハック</text>
  <rect x="20" y="44" width="560" height="44" rx="8" fill="white" stroke="#BFDBFE" stroke-width="1.5"/>
  <circle cx="52" cy="66" r="18" fill="#2563EB"/>
  <text x="52" y="70" text-anchor="middle" fill="white" font-size="11" font-weight="700">1</text>
  <text x="84" y="61" fill="#1E293B" font-size="13" font-weight="700">日本語回答が来ない問題の解消法</text>
  <text x="84" y="79" fill="#64748B" font-size="11">質問末尾に「日本語で回答してください」と追記。地名・時制・対象を具体化する</text>
  <rect x="20" y="96" width="560" height="44" rx="8" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
  <circle cx="52" cy="118" r="18" fill="#2563EB"/>
  <text x="52" y="122" text-anchor="middle" fill="white" font-size="11" font-weight="700">2</text>
  <text x="84" y="113" fill="#1E293B" font-size="13" font-weight="700">出典付きプロンプトで資料の信頼性を引き上げる</text>
  <text x="84" y="131" fill="#1D4ED8" font-size="11" font-weight="600">「一次情報を優先」と明示。出典が自動付与され裏取り工数がゼロになる</text>
  <rect x="20" y="148" width="560" height="44" rx="8" fill="white" stroke="#BFDBFE" stroke-width="1.5"/>
  <circle cx="52" cy="170" r="18" fill="#2563EB"/>
  <text x="52" y="174" text-anchor="middle" fill="white" font-size="11" font-weight="700">3</text>
  <text x="84" y="165" fill="#1E293B" font-size="13" font-weight="700">4要素プロンプトで回答の精度を上げる</text>
  <text x="84" y="183" fill="#64748B" font-size="11">①対象 ②時制・期間 ③出典要求 ④出力形式 — 毎回この4要素を盛り込む</text>
  <rect x="20" y="200" width="560" height="44" rx="8" fill="white" stroke="#BFDBFE" stroke-width="1.5"/>
  <circle cx="52" cy="222" r="18" fill="#2563EB"/>
  <text x="52" y="226" text-anchor="middle" fill="white" font-size="11" font-weight="700">4</text>
  <text x="84" y="217" fill="#1E293B" font-size="13" font-weight="700">Deep Researchを正しく使う5ステップ</text>
  <text x="84" y="235" fill="#64748B" font-size="11">数値データは引用番号で元ソース確認必須。コピペ直用はNG</text>
  <rect x="20" y="252" width="560" height="44" rx="8" fill="white" stroke="#BFDBFE" stroke-width="1.5"/>
  <circle cx="52" cy="274" r="18" fill="#2563EB"/>
  <text x="52" y="278" text-anchor="middle" fill="white" font-size="11" font-weight="700">5</text>
  <text x="84" y="269" fill="#1E293B" font-size="13" font-weight="700">Spacesでナレッジベースを育てる</text>
  <text x="84" y="287" fill="#64748B" font-size="11">プロジェクト別にPDF・URL・検索結果を蓄積。毎回ゼロから始めない仕組みを構築</text>
</svg>
