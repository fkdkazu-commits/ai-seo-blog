<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 195" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">
  <rect width="600" height="195" rx="14" fill="#EFF6FF"/>
  <text x="300" y="26" text-anchor="middle" fill="#1E40AF" font-size="13" font-weight="700">3ツールの役割分担：使い分けの判断基準</text>
  <!-- Card 1: GitHub Copilot x=20 -->
  <rect x="20" y="40" width="176" height="140" rx="10" fill="white" stroke="#BFDBFE" stroke-width="1.5"/>
  <rect x="46" y="54" width="124" height="26" rx="13" fill="#0891B2"/>
  <text x="108" y="71" text-anchor="middle" fill="white" font-size="11" font-weight="700">GitHub Copilot</text>
  <text x="108" y="104" text-anchor="middle" fill="#1E293B" font-size="13" font-weight="700">$10/月〜</text>
  <text x="108" y="124" text-anchor="middle" fill="#64748B" font-size="11">インライン補完が目的</text>
