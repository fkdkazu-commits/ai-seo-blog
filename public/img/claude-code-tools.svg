  <text x="108" y="161" text-anchor="middle" fill="#64748B" font-size="11">GH Enterprise連携有利</text>
  <!-- Card 2: Cursor x=212 -->
  <rect x="212" y="40" width="176" height="140" rx="10" fill="white" stroke="#BFDBFE" stroke-width="1.5"/>
  <rect x="238" y="54" width="124" height="26" rx="13" fill="#7C3AED"/>
  <text x="300" y="71" text-anchor="middle" fill="white" font-size="11" font-weight="700">Cursor</text>
  <text x="300" y="104" text-anchor="middle" fill="#1E293B" font-size="13" font-weight="700">IDEから離れない</text>
  <text x="300" y="124" text-anchor="middle" fill="#64748B" font-size="11">視覚的なDiff確認</text>
  <text x="300" y="142" text-anchor="middle" fill="#64748B" font-size="11">補完＋チャット統合</text>
  <text x="300" y="161" text-anchor="middle" fill="#64748B" font-size="11">GUI重視のチーム向け</text>
  <!-- Card 3: Claude Code x=404 -->
  <rect x="404" y="40" width="176" height="140" rx="10" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
  <rect x="430" y="54" width="124" height="26" rx="13" fill="#2563EB"/>
  <text x="492" y="71" text-anchor="middle" fill="white" font-size="11" font-weight="700">Claude Code ★</text>
