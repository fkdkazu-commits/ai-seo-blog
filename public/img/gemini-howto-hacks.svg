<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 308" role="img" aria-label="Geminiを業務フローに組み込む5つのテクニック">
  <rect width="600" height="308" rx="14" fill="#EFF6FF"/>
  <text x="300" y="26" text-anchor="middle" fill="#1E40AF" font-size="13" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif" font-weight="700">Geminiを業務フローに組み込む5つのテクニック</text>

  <!-- Row 1 -->
  <rect x="20" y="44" width="560" height="44" rx="8" fill="white" stroke="#BFDBFE" stroke-width="1.5"/>
  <circle cx="52" cy="66" r="18" fill="#2563EB"/>
  <text x="52" y="71" text-anchor="middle" fill="white" font-size="11" font-family="sans-serif" font-weight="700">1</text>
  <text x="84" y="59" fill="#1E293B" font-size="13" font-family="'Noto Sans JP',sans-serif" font-weight="700">4要素プロンプト設計（PTCF）</text>
  <text x="84" y="78" fill="#64748B" font-size="11" font-family="'Noto Sans JP',sans-serif">ペルソナ・タスク・コンテキスト・フォーマットを明記する</text>

  <!-- Row 2 (highlighted) -->
  <rect x="20" y="96" width="560" height="44" rx="8" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
  <circle cx="52" cy="118" r="18" fill="#1D4ED8"/>
  <text x="52" y="123" text-anchor="middle" fill="white" font-size="11" font-family="sans-serif" font-weight="700">2</text>
  <text x="84" y="111" fill="#1E293B" font-size="13" font-family="'Noto Sans JP',sans-serif" font-weight="700">スプレッドシートでデータ分析を自動化</text>
  <text x="84" y="130" fill="#1D4ED8" font-size="11" font-family="'Noto Sans JP',sans-serif" font-weight="600">★ サイドパネルから自然言語でテーブル・数式を生成</text>

  <!-- Row 3 -->
  <rect x="20" y="148" width="560" height="44" rx="8" fill="white" stroke="#BFDBFE" stroke-width="1.5"/>
  <circle cx="52" cy="170" r="18" fill="#2563EB"/>
  <text x="52" y="175" text-anchor="middle" fill="white" font-size="11" font-family="sans-serif" font-weight="700">3</text>
  <text x="84" y="163" fill="#1E293B" font-size="13" font-family="'Noto Sans JP',sans-serif" font-weight="700">Gmail連携で返信作業を5〜7→2〜3ステップに削減</text>
  <text x="84" y="182" fill="#64748B" font-size="11" font-family="'Noto Sans JP',sans-serif">スレッド全体を自動参照・コピペ不要</text>

  <!-- Row 4 -->
  <rect x="20" y="200" width="560" height="44" rx="8" fill="white" stroke="#BFDBFE" stroke-width="1.5"/>
  <circle cx="52" cy="222" r="18" fill="#2563EB"/>
  <text x="52" y="227" text-anchor="middle" fill="white" font-size="11" font-family="sans-serif" font-weight="700">4</text>
  <text x="84" y="215" fill="#1E293B" font-size="13" font-family="'Noto Sans JP',sans-serif" font-weight="700">「回答を再確認」機能でハルシネーションを防ぐ</text>
  <text x="84" y="234" fill="#64748B" font-size="11" font-family="'Noto Sans JP',sans-serif">緑＝確認済み / オレンジ＝要一次情報確認</text>

  <!-- Row 5 -->
  <rect x="20" y="252" width="560" height="44" rx="8" fill="white" stroke="#BFDBFE" stroke-width="1.5"/>
  <circle cx="52" cy="274" r="18" fill="#2563EB"/>
  <text x="52" y="279" text-anchor="middle" fill="white" font-size="11" font-family="sans-serif" font-weight="700">5</text>
  <text x="84" y="267" fill="#1E293B" font-size="13" font-family="'Noto Sans JP',sans-serif" font-weight="700">Deep Researchで競合調査の作業時間を削減</text>
  <text x="84" y="286" fill="#64748B" font-size="11" font-family="'Noto Sans JP',sans-serif">複数情報源を横断的に検索・レポートを自動生成</text>
</svg>
