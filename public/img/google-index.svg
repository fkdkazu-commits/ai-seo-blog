<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 220" role="img" aria-label="URL検査とインデックス登録の手順">
  <rect width="600" height="220" rx="14" fill="#EFF6FF"/>
  <text x="300" y="26" text-anchor="middle" fill="#1E40AF" font-size="13" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif" font-weight="700">URL検査ツールとインデックス登録の手順</text>

  <rect x="20" y="44" width="560" height="44" rx="8" fill="white" stroke="#BFDBFE" stroke-width="1.5"/>
  <circle cx="52" cy="66" r="18" fill="#2563EB"/>
  <text x="52" y="71" text-anchor="middle" fill="white" font-size="11" font-family="sans-serif" font-weight="700">1</text>
  <text x="84" y="59" fill="#1E293B" font-size="13" font-family="'Noto Sans JP',sans-serif" font-weight="700">左メニュー「URL検査」をクリック</text>
  <text x="84" y="78" fill="#64748B" font-size="11" font-family="'Noto Sans JP',sans-serif">検索バーに確認したいページのURLを入力してEnter</text>

  <rect x="20" y="96" width="560" height="44" rx="8" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
  <circle cx="52" cy="118" r="18" fill="#1D4ED8"/>
  <text x="52" y="123" text-anchor="middle" fill="white" font-size="11" font-family="sans-serif" font-weight="700">2</text>
  <text x="84" y="111" fill="#1E293B" font-size="13" font-family="'Noto Sans JP',sans-serif" font-weight="700">「URLはGoogleに登録されています」→ 問題なし</text>
  <text x="84" y="130" fill="#1D4ED8" font-size="11" font-family="'Noto Sans JP',sans-serif" font-weight="600">★ 「登録されていません」→「インデックス登録をリクエスト」をクリック</text>

  <rect x="20" y="148" width="560" height="44" rx="8" fill="white" stroke="#BFDBFE" stroke-width="1.5"/>
  <circle cx="52" cy="170" r="18" fill="#2563EB"/>
  <text x="52" y="175" text-anchor="middle" fill="white" font-size="11" font-family="sans-serif" font-weight="700">3</text>
  <text x="84" y="163" fill="#1E293B" font-size="13" font-family="'Noto Sans JP',sans-serif" font-weight="700">新記事公開後は毎回インデックスリクエストを送る</text>
  <text x="84" y="182" fill="#64748B" font-size="11" font-family="'Noto Sans JP',sans-serif">数日〜1週間でインデックスされる・習慣にすると評価開始が早まる</text>
</svg>
