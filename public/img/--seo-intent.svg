<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 294" role="img" aria-label="検索意図4分類">
  <rect width="600" height="294" rx="14" fill="#EFF6FF"/>
  <text x="300" y="26" text-anchor="middle" fill="#1E40AF" font-size="13" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif" font-weight="700">検索意図の4分類（サーチインテント）</text>

  <rect x="20" y="40" width="270" height="110" rx="10" fill="white" stroke="#BFDBFE" stroke-width="1.5"/>
  <rect x="20" y="40" width="270" height="32" rx="10" fill="#2563EB"/>
  <rect x="20" y="58" width="270" height="14" fill="#2563EB"/>
  <text x="155" y="62" text-anchor="middle" fill="white" font-size="12" font-family="'Noto Sans JP',sans-serif" font-weight="700">情報収集型（Informational）</text>
  <text x="36" y="90" fill="#1E293B" font-size="12" font-family="'Noto Sans JP',sans-serif" font-weight="700">知識・情報を得たい</text>
  <text x="36" y="110" fill="#64748B" font-size="11" font-family="'Noto Sans JP',sans-serif">例：「SEO 書き方」</text>
  <text x="36" y="130" fill="#2563EB" font-size="11" font-family="'Noto Sans JP',sans-serif" font-weight="600">ノウハウ・手順・チェックリストを提供</text>

  <rect x="310" y="40" width="270" height="110" rx="10" fill="white" stroke="#BFDBFE" stroke-width="1.5"/>
  <rect x="310" y="40" width="270" height="32" rx="10" fill="#0891B2"/>
  <rect x="310" y="58" width="270" height="14" fill="#0891B2"/>
  <text x="445" y="62" text-anchor="middle" fill="white" font-size="12" font-family="'Noto Sans JP',sans-serif" font-weight="700">案内型（Navigational）</text>
  <text x="326" y="90" fill="#1E293B" font-size="12" font-family="'Noto Sans JP',sans-serif" font-weight="700">特定のサイトへ行きたい</text>
  <text x="326" y="110" fill="#64748B" font-size="11" font-family="'Noto Sans JP',sans-serif">例：「Google SC ログイン」</text>
  <text x="326" y="130" fill="#0891B2" font-size="11" font-family="'Noto Sans JP',sans-serif" font-weight="600">公式URLへの誘導が目的</text>

  <rect x="20" y="164" width="270" height="110" rx="10" fill="white" stroke="#BBF7D0" stroke-width="2"/>
  <rect x="20" y="164" width="270" height="32" rx="10" fill="#059669"/>
  <rect x="20" y="182" width="270" height="14" fill="#059669"/>
  <text x="155" y="186" text-anchor="middle" fill="white" font-size="12" font-family="'Noto Sans JP',sans-serif" font-weight="700">取引型（Transactional）</text>
  <text x="36" y="214" fill="#1E293B" font-size="12" font-family="'Noto Sans JP',sans-serif" font-weight="700">購入・申込をしたい</text>
  <text x="36" y="234" fill="#64748B" font-size="11" font-family="'Noto Sans JP',sans-serif">例：「SEOツール 申し込み」</text>
  <text x="36" y="254" fill="#059669" font-size="11" font-family="'Noto Sans JP',sans-serif" font-weight="600">★ アフィリエイト収益に直結</text>

  <rect x="310" y="164" width="270" height="110" rx="10" fill="white" stroke="#FDE68A" stroke-width="1.5"/>
  <rect x="310" y="164" width="270" height="32" rx="10" fill="#D97706"/>
  <rect x="310" y="182" width="270" height="14" fill="#D97706"/>
  <text x="445" y="186" text-anchor="middle" fill="white" font-size="12" font-family="'Noto Sans JP',sans-serif" font-weight="700">調査型（Commercial）</text>
  <text x="326" y="214" fill="#1E293B" font-size="12" font-family="'Noto Sans JP',sans-serif" font-weight="700">比較・検討したい</text>
  <text x="326" y="234" fill="#64748B" font-size="11" font-family="'Noto Sans JP',sans-serif">例：「SEOツール おすすめ」</text>
  <text x="326" y="254" fill="#D97706" font-size="11" font-family="'Noto Sans JP',sans-serif" font-weight="600">比較記事・レビューが効果的</text>
</svg>
