<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 220" role="img" aria-label="キーワード選定をしないと起きる3つの問題">
  <rect width="600" height="220" rx="14" fill="#EFF6FF"/>
  <text x="300" y="26" text-anchor="middle" fill="#1E40AF" font-size="13" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif" font-weight="700">キーワード選定をしないと起きる3つの問題</text>

  <!-- 問題① -->
  <rect x="20" y="44" width="560" height="44" rx="8" fill="white" stroke="#BFDBFE" stroke-width="1.5"/>
  <circle cx="52" cy="66" r="18" fill="#DC2626"/>
  <text x="52" y="71" text-anchor="middle" fill="white" font-size="13" font-family="sans-serif" font-weight="700">①</text>
  <text x="84" y="59" fill="#1E293B" font-size="13" font-family="'Noto Sans JP',sans-serif" font-weight="700">誰も検索しないキーワードで記事を量産してしまう</text>
  <text x="84" y="78" fill="#64748B" font-size="11" font-family="'Noto Sans JP',sans-serif">需要のない記事を書き続け、作業時間を無駄にするセルフダメージが続く</text>

  <!-- 問題② -->
  <rect x="20" y="96" width="560" height="44" rx="8" fill="white" stroke="#BFDBFE" stroke-width="1.5"/>
  <circle cx="52" cy="118" r="18" fill="#DC2626"/>
  <text x="52" y="123" text-anchor="middle" fill="white" font-size="13" font-family="sans-serif" font-weight="700">②</text>
  <text x="84" y="111" fill="#1E293B" font-size="13" font-family="'Noto Sans JP',sans-serif" font-weight="700">競合が強すぎるキーワードで消耗戦になる</text>
  <text x="84" y="130" fill="#64748B" font-size="11" font-family="'Noto Sans JP',sans-serif">ドメイン評価が低い新規サイトでは、ビッグKWの上位に届かない</text>

  <!-- 問題③ -->
  <rect x="20" y="148" width="560" height="44" rx="8" fill="white" stroke="#BFDBFE" stroke-width="1.5"/>
  <circle cx="52" cy="170" r="18" fill="#DC2626"/>
  <text x="52" y="175" text-anchor="middle" fill="white" font-size="13" font-family="sans-serif" font-weight="700">③</text>
  <text x="84" y="163" fill="#1E293B" font-size="13" font-family="'Noto Sans JP',sans-serif" font-weight="700">キーワードカニバリゼーションでGoogleの評価が分散する</text>
  <text x="84" y="182" fill="#64748B" font-size="11" font-family="'Noto Sans JP',sans-serif">同テーマの記事が増えるほど、記事同士が互いの順位を下げ合う</text>
</svg>
