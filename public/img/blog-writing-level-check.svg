<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 195" role="img" aria-label="ブログSEO成熟度チェックの判定基準">
  <rect width="600" height="195" rx="14" fill="#EFF6FF"/>
  <text x="300" y="26" text-anchor="middle" fill="#1E40AF" font-size="13" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif" font-weight="700">✓の合計数で現在のフェーズを確認しよう</text>

  <!-- Card 1: 初心者（0〜3個） -->
  <rect x="20" y="40" width="176" height="140" rx="10" fill="white" stroke="#BFDBFE" stroke-width="1.5"/>
  <rect x="46" y="54" width="124" height="26" rx="13" fill="#CBD5E1"/>
  <text x="108" y="72" text-anchor="middle" fill="white" font-size="12" font-family="sans-serif" font-weight="700">0〜3個</text>
  <text x="108" y="104" text-anchor="middle" fill="#1E293B" font-size="13" font-family="'Noto Sans JP',sans-serif" font-weight="700">初心者フェーズ</text>
  <text x="108" y="124" text-anchor="middle" fill="#64748B" font-size="11" font-family="'Noto Sans JP',sans-serif">テクニック①〜③</text>
  <text x="108" y="142" text-anchor="middle" fill="#64748B" font-size="11" font-family="'Noto Sans JP',sans-serif">まず1本書き切る</text>
  <text x="108" y="161" text-anchor="middle" fill="#64748B" font-size="10" font-family="'Noto Sans JP',sans-serif">ことを最優先に</text>

  <!-- Card 2: 中級者（4〜6個） -->
  <rect x="212" y="40" width="176" height="140" rx="10" fill="white" stroke="#BFDBFE" stroke-width="1.5"/>
  <rect x="238" y="54" width="124" height="26" rx="13" fill="#3B82F6"/>
  <text x="300" y="72" text-anchor="middle" fill="white" font-size="12" font-family="sans-serif" font-weight="700">4〜6個</text>
  <text x="300" y="104" text-anchor="middle" fill="#1E293B" font-size="13" font-family="'Noto Sans JP',sans-serif" font-weight="700">中級者フェーズ</text>
  <text x="300" y="124" text-anchor="middle" fill="#64748B" font-size="11" font-family="'Noto Sans JP',sans-serif">テクニック④〜⑤</text>
  <text x="300" y="142" text-anchor="middle" fill="#64748B" font-size="11" font-family="'Noto Sans JP',sans-serif">体験談の密度を上げ</text>
  <text x="300" y="161" text-anchor="middle" fill="#64748B" font-size="10" font-family="'Noto Sans JP',sans-serif">順位変化を数値で確認</text>

  <!-- Card 3: 上級者（7〜8個） -->
  <rect x="404" y="40" width="176" height="140" rx="10" fill="white" stroke="#BFDBFE" stroke-width="1.5"/>
  <rect x="430" y="54" width="124" height="26" rx="13" fill="#1D4ED8"/>
  <text x="492" y="72" text-anchor="middle" fill="white" font-size="12" font-family="sans-serif" font-weight="700">7〜8個</text>
  <text x="492" y="104" text-anchor="middle" fill="#1E293B" font-size="13" font-family="'Noto Sans JP',sans-serif" font-weight="700">上級者フェーズ</text>
  <text x="492" y="124" text-anchor="middle" fill="#64748B" font-size="11" font-family="'Noto Sans JP',sans-serif">リライト・内部リンク</text>
  <text x="492" y="142" text-anchor="middle" fill="#64748B" font-size="11" font-family="'Noto Sans JP',sans-serif">を月次で管理する</text>
  <text x="492" y="161" text-anchor="middle" fill="#64748B" font-size="10" font-family="'Noto Sans JP',sans-serif">段階に進んでいる</text>
</svg>
