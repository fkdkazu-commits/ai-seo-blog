<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 168" role="img" aria-label="Google サーチコンソールとアナリティクスの違い">
  <rect width="600" height="168" rx="14" fill="#EFF6FF"/>
  <text x="300" y="26" text-anchor="middle" fill="#1E40AF" font-size="13" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif" font-weight="700">サーチコンソール vs Googleアナリティクスの違い</text>

  <rect x="20" y="44" width="560" height="36" rx="8" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
  <circle cx="52" cy="62" r="14" fill="#1D4ED8"/>
  <text x="52" y="67" text-anchor="middle" fill="white" font-size="9" font-family="sans-serif" font-weight="700">SC</text>
  <text x="78" y="57" fill="#1E293B" font-size="12" font-family="'Noto Sans JP',sans-serif" font-weight="700">Googleサーチコンソール</text>
  <text x="78" y="74" fill="#1D4ED8" font-size="11" font-family="'Noto Sans JP',sans-serif" font-weight="600">★ 「検索結果でどう見えているか」を分析（訪問前のデータ）</text>

  <rect x="20" y="88" width="560" height="36" rx="8" fill="white" stroke="#BFDBFE" stroke-width="1.5"/>
  <circle cx="52" cy="106" r="14" fill="#2563EB"/>
  <text x="52" y="111" text-anchor="middle" fill="white" font-size="9" font-family="sans-serif" font-weight="700">GA4</text>
  <text x="78" y="101" fill="#1E293B" font-size="12" font-family="'Noto Sans JP',sans-serif" font-weight="700">Googleアナリティクス（GA4）</text>
  <text x="78" y="118" fill="#64748B" font-size="11" font-family="'Noto Sans JP',sans-serif">「訪問したユーザーの行動」を分析（訪問後のデータ）</text>

  <rect x="20" y="124" width="560" height="36" rx="8" fill="white" stroke="#BFDBFE" stroke-width="1.5"/>
  <circle cx="52" cy="142" r="14" fill="#2563EB"/>
  <text x="52" y="147" text-anchor="middle" fill="white" font-size="9" font-family="sans-serif" font-weight="700">優先</text>
  <text x="78" y="137" fill="#1E293B" font-size="12" font-family="'Noto Sans JP',sans-serif" font-weight="700">まずSCで「どんなKWで流入しているか」を把握するのが先決</text>
  <text x="78" y="154" fill="#64748B" font-size="11" font-family="'Noto Sans JP',sans-serif">両ツールを連携するとより深い分析が可能になる</text>
</svg>
