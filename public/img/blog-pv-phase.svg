<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 195" role="img" aria-label="ブログPV停滞フェーズ診断">
  <rect width="600" height="195" rx="14" fill="#EFF6FF"/>
  <text x="300" y="26" text-anchor="middle" fill="#1E40AF" font-size="13" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif" font-weight="700">PV停滞の原因はフェーズによって異なる</text>

  <!-- Card 1: フェーズ1 基盤構築期 -->
  <rect x="20" y="40" width="176" height="140" rx="10" fill="white" stroke="#BFDBFE" stroke-width="1.5"/>
  <rect x="46" y="54" width="124" height="26" rx="13" fill="#94A3B8"/>
  <text x="108" y="72" text-anchor="middle" fill="white" font-size="11" font-family="sans-serif" font-weight="700">フェーズ1</text>
  <text x="108" y="100" text-anchor="middle" fill="#1E293B" font-size="11" font-family="'Noto Sans JP',sans-serif" font-weight="700">記事30以下</text>
  <text x="108" y="118" text-anchor="middle" fill="#1E293B" font-size="11" font-family="'Noto Sans JP',sans-serif" font-weight="700">基盤構築期</text>
  <text x="108" y="140" text-anchor="middle" fill="#DC2626" font-size="11" font-family="'Noto Sans JP',sans-serif" font-weight="600">技術設定を先に確認</text>
  <text x="108" y="160" text-anchor="middle" fill="#64748B" font-size="10" font-family="'Noto Sans JP',sans-serif">インデックス・SC登録</text>

  <!-- Card 2: フェーズ2 成長途上期 -->
  <rect x="212" y="40" width="176" height="140" rx="10" fill="white" stroke="#BFDBFE" stroke-width="1.5"/>
  <rect x="238" y="54" width="124" height="26" rx="13" fill="#3B82F6"/>
  <text x="300" y="72" text-anchor="middle" fill="white" font-size="11" font-family="sans-serif" font-weight="700">フェーズ2</text>
  <text x="300" y="100" text-anchor="middle" fill="#1E293B" font-size="11" font-family="'Noto Sans JP',sans-serif" font-weight="700">記事30〜100</text>
  <text x="300" y="118" text-anchor="middle" fill="#1E293B" font-size="11" font-family="'Noto Sans JP',sans-serif" font-weight="700">成長途上期</text>
  <text x="300" y="140" text-anchor="middle" fill="#2563EB" font-size="11" font-family="'Noto Sans JP',sans-serif" font-weight="600">改善の仕組みを作る</text>
  <text x="300" y="160" text-anchor="middle" fill="#64748B" font-size="10" font-family="'Noto Sans JP',sans-serif">リライト・内部リンク優先</text>

  <!-- Card 3: フェーズ3 最適化期 -->
  <rect x="404" y="40" width="176" height="140" rx="10" fill="white" stroke="#BFDBFE" stroke-width="1.5"/>
  <rect x="430" y="54" width="124" height="26" rx="13" fill="#1D4ED8"/>
  <text x="492" y="72" text-anchor="middle" fill="white" font-size="11" font-family="sans-serif" font-weight="700">フェーズ3</text>
  <text x="492" y="100" text-anchor="middle" fill="#1E293B" font-size="11" font-family="'Noto Sans JP',sans-serif" font-weight="700">記事100以上</text>
  <text x="492" y="118" text-anchor="middle" fill="#1E293B" font-size="11" font-family="'Noto Sans JP',sans-serif" font-weight="700">最適化期</text>
  <text x="492" y="140" text-anchor="middle" fill="#059669" font-size="11" font-family="'Noto Sans JP',sans-serif" font-weight="600">技術的SEOが勝負</text>
  <text x="492" y="160" text-anchor="middle" fill="#64748B" font-size="10" font-family="'Noto Sans JP',sans-serif">E-E-A-T・Core Web Vitals</text>
</svg>
