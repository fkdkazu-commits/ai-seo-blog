<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 168" role="img" aria-label="サーチコンソールを使いこなすための3つの習慣">
  <rect width="600" height="168" rx="14" fill="#EFF6FF"/>
  <text x="300" y="26" text-anchor="middle" fill="#1E40AF" font-size="13" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif" font-weight="700">サーチコンソールを使いこなすための3つの習慣</text>

  <rect x="20" y="44" width="560" height="36" rx="8" fill="white" stroke="#BFDBFE" stroke-width="1.5"/>
  <circle cx="52" cy="62" r="14" fill="#2563EB"/>
  <text x="52" y="67" text-anchor="middle" fill="white" font-size="10" font-family="sans-serif" font-weight="700">①</text>
  <text x="78" y="57" fill="#1E293B" font-size="12" font-family="'Noto Sans JP',sans-serif" font-weight="700">週1回の定点観測：クリック数・表示回数の推移をチェック</text>
  <text x="78" y="74" fill="#64748B" font-size="11" font-family="'Noto Sans JP',sans-serif">急激な変化はアルゴリズムアップデートやサイト不具合のサイン</text>

  <rect x="20" y="88" width="560" height="36" rx="8" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
  <circle cx="52" cy="106" r="14" fill="#1D4ED8"/>
  <text x="52" y="111" text-anchor="middle" fill="white" font-size="10" font-family="sans-serif" font-weight="700">②</text>
  <text x="78" y="101" fill="#1E293B" font-size="12" font-family="'Noto Sans JP',sans-serif" font-weight="700">新記事公開後のURL検査→インデックスリクエスト送信</text>
  <text x="78" y="118" fill="#1D4ED8" font-size="11" font-family="'Noto Sans JP',sans-serif" font-weight="600">★ インデックスのスピードが上がり、評価開始が早まる</text>

  <rect x="20" y="124" width="560" height="36" rx="8" fill="white" stroke="#BFDBFE" stroke-width="1.5"/>
  <circle cx="52" cy="142" r="14" fill="#2563EB"/>
  <text x="52" y="147" text-anchor="middle" fill="white" font-size="10" font-family="sans-serif" font-weight="700">③</text>
  <text x="78" y="137" fill="#1E293B" font-size="12" font-family="'Noto Sans JP',sans-serif" font-weight="700">月1回クエリレポート確認→想定外KWの記事を強化する</text>
  <text x="78" y="154" fill="#64748B" font-size="11" font-family="'Noto Sans JP',sans-serif">そのキーワードに合わせて加筆するとSEO効果が高まる</text>
</svg>
