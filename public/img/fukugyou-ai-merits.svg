<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 168" role="img" aria-label="AIツールを副業に活用するメリット">
  <rect width="600" height="168" rx="14" fill="#EFF6FF"/>
  <text x="300" y="26" text-anchor="middle" fill="#1E40AF" font-size="13" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif" font-weight="700">AIツールを副業に活用する3つのメリット</text>

  <!-- Row 1 (highlighted) -->
  <rect x="20" y="44" width="560" height="36" rx="8" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
  <circle cx="52" cy="62" r="14" fill="#1D4ED8"/>
  <text x="52" y="67" text-anchor="middle" fill="white" font-size="10" font-family="sans-serif" font-weight="700">①</text>
  <text x="78" y="57" fill="#1E293B" font-size="12" font-family="'Noto Sans JP',sans-serif" font-weight="700">時間あたりの生産量が大幅に増える</text>
  <text x="78" y="74" fill="#1D4ED8" font-size="11" font-family="'Noto Sans JP',sans-serif" font-weight="600">★ 1記事2〜3時間→AIの補助で1時間以内に完了</text>

  <!-- Row 2 -->
  <rect x="20" y="88" width="560" height="36" rx="8" fill="white" stroke="#BFDBFE" stroke-width="1.5"/>
  <circle cx="52" cy="106" r="14" fill="#2563EB"/>
  <text x="52" y="111" text-anchor="middle" fill="white" font-size="10" font-family="sans-serif" font-weight="700">②</text>
  <text x="78" y="101" fill="#1E293B" font-size="12" font-family="'Noto Sans JP',sans-serif" font-weight="700">新しい分野の学習コストを大幅に下げられる</text>
  <text x="78" y="118" fill="#64748B" font-size="11" font-family="'Noto Sans JP',sans-serif">AIに質問すると難しい概念をやさしく説明してもらえる</text>

  <!-- Row 3 -->
  <rect x="20" y="124" width="560" height="36" rx="8" fill="white" stroke="#BFDBFE" stroke-width="1.5"/>
  <circle cx="52" cy="142" r="14" fill="#2563EB"/>
  <text x="52" y="147" text-anchor="middle" fill="white" font-size="10" font-family="sans-serif" font-weight="700">③</text>
  <text x="78" y="137" fill="#1E293B" font-size="12" font-family="'Noto Sans JP',sans-serif" font-weight="700">AIは「補助ツール」として使う（最終判断は人間）</text>
  <text x="78" y="154" fill="#64748B" font-size="11" font-family="'Noto Sans JP',sans-serif">ファクトチェックと修正を怠ると品質低下につながる</text>
</svg>
